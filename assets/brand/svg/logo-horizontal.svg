<?xml version="1.0" encoding="UTF-8"?>
<!--
  LeadCove · primary horizontal logo (mark + wordmark)
  This is the default lockup. Use everywhere the mark + name belong
  side by side: site headers, navigation, email signatures, slide
  decks. Mark height = wordmark cap-height.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" role="img" aria-label="LeadCove">
  <title>LeadCove</title>
  <!-- Mark -->
  <g transform="translate(0, 0) scale(0.78125)">
    <rect width="256" height="256" rx="56" fill="#0B2545"/>
    <circle cx="194" cy="80" r="22" fill="#0E9F95"/>
    <path d="M 24 168 C 56 140, 96 140, 128 168 C 160 196, 200 196, 232 168"
          fill="none" stroke="#0E9F95" stroke-width="17" stroke-linecap="round"/>
    <path d="M 24 208 C 56 180, 96 180, 128 208 C 160 236, 200 236, 232 208"
          fill="none" stroke="#0E9F95" stroke-width="17" stroke-linecap="round" opacity="0.55"/>
  </g>
  <!-- Wordmark — sits to the right of the mark, vertically centered -->
  <text x="240" y="138"
        font-family="Fraunces, 'Times New Roman', Georgia, serif"
        font-size="140"
        font-weight="600"
        letter-spacing="-2.5"
        fill="#0B2545">LeadCove</text>
</svg>
