<?xml version="1.0" encoding="UTF-8"?>
<!--
  LeadCove · primary mark (icon only)
  Use on light backgrounds. The teal wave + sun on navy is the core
  brand glyph. Same artwork as favicon.svg, scaled up + slightly
  refined stroke weights for larger applications.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="LeadCove">
  <title>LeadCove</title>
  <rect width="256" height="256" rx="56" fill="#0B2545"/>
  <!-- Sun glyph — top-right, sized for visual balance with the waves -->
  <circle cx="194" cy="80" r="22" fill="#0E9F95"/>
  <!-- Primary wave — thicker, full opacity -->
  <path d="M 24 168 C 56 140, 96 140, 128 168 C 160 196, 200 196, 232 168"
        fill="none" stroke="#0E9F95" stroke-width="17" stroke-linecap="round"/>
  <!-- Secondary wave — beneath, softer for depth -->
  <path d="M 24 208 C 56 180, 96 180, 128 208 C 160 236, 200 236, 232 208"
        fill="none" stroke="#0E9F95" stroke-width="17" stroke-linecap="round" opacity="0.55"/>
</svg>
