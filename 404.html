<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Page not found · LeadCove</title>
<meta name="description" content="That page doesn't exist on LeadCove. Head back home to start prospecting." />
<meta name="robots" content="noindex" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="apple-touch-icon" href="/favicon.svg" />
<meta name="theme-color" content="#0B2545" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css" />
<style>
  /* 404 — minimal centered layout. Matches the marketing brand
     (cream bg, navy serif numerals, teal accent) without re-using
     the full nav/footer. The goal is "get them back to a useful
     page in one click", not to make a destination of itself. */
  .nf {
    min-height: calc(100vh - 0px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 64px 24px;
    background: var(--cream);
  }
  .nf-card {
    max-width: 560px;
    width: 100%;
    text-align: center;
  }
  .nf-brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 36px;
    color: var(--navy);
    text-decoration: none;
  }
  .nf-brand svg { width: 32px; height: 32px; color: var(--teal); }
  .nf-brand span {
    font-family: var(--f-display);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .nf-num {
    font-family: var(--f-display);
    font-size: clamp(96px, 18vw, 168px);
    line-height: 1;
    font-weight: 700;
    letter-spacing: -0.04em;
    color: var(--navy);
    margin: 0 0 8px;
  }
  .nf-num span { color: var(--teal); }
  .nf-title {
    font-family: var(--f-display);
    font-size: clamp(26px, 3.6vw, 34px);
    font-weight: 600;
    line-height: 1.2;
    letter-spacing: -0.01em;
    color: var(--navy);
    margin: 0 0 14px;
  }
  .nf-sub {
    font-size: 17px;
    line-height: 1.55;
    color: var(--ink-2);
    margin: 0 0 32px;
  }
  .nf-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .nf-fine {
    margin-top: 36px;
    font-size: 13px;
    color: var(--muted);
  }
  .nf-fine a { color: var(--teal-2); }
</style>
</head>
<body>
<section class="nf">
  <div class="nf-card">
    <a class="nf-brand" href="/">
      <svg viewBox="0 0 40 40" aria-hidden="true">
        <path d="M3 26 C 8 22, 14 22, 20 26 C 26 30, 32 30, 37 26" stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round"/>
        <path d="M3 32 C 8 28, 14 28, 20 32 C 26 36, 32 36, 37 32" stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round" opacity="0.5"/>
        <circle cx="30" cy="14" r="3" fill="currentColor"/>
      </svg>
      <span>LeadCove</span>
    </a>
    <p class="nf-num">4<span>0</span>4</p>
    <h1 class="nf-title">That page didn't make it onto the list.</h1>
    <p class="nf-sub">
      The link you followed is broken or the page has moved. The good news:
      everything else still works. Pick a place to land.
    </p>
    <div class="nf-actions">
      <a href="/" class="btn-primary btn-lg">Back to home</a>
      <a href="/blog/" class="btn-ghost btn-lg">Read the blog</a>
    </div>
    <p class="nf-fine">
      Think this page should exist? <a href="mailto:hello@leadcove.io">Tell us</a>.
    </p>
  </div>
</section>
</body>
</html>
